<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITLINK 회원 상세 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="appWrapper">
  <header id="globalHeader">
    <div id="logo">FITLINK</div>
    <div id="userInfo">
      <span><b>김트레이너</b> 강사님</span>
      <button id="btnGoTrainerDashboard">강사 대시보드</button>
    </div>
  </header>

  <section id="subHeader">
    <div class="sub-header-left">
      <button class="btn-back" id="btnBackTrainerList">← 목록으로</button>
      <h1 class="member-title"><b id="selectedMemberName">회원</b> 상세 피드백</h1>
    </div>
    <button class="btn-delete" id="btnDeleteMember">회원 삭제</button>
  </section>

  <main id="mainLayout">
    <article class="dashboard-card" id="leftCol">
      <div class="calendar-detail-header">
        <h3>스케줄 배정 달력</h3>
        <div class="pt-counter">
          <span>남은 PT: <span id="selectedMemberPt" class="pt-count-value">0회</span></span>
          <button class="btn-pt-adjust" id="btnPtMinus">-1회</button>
          <button class="btn-pt-adjust" id="btnPtPlus">+1회</button>
        </div>
      </div>

      <nav class="calendar-nav">
        <span class="nav-arrow" id="btnPrevMonth">&lt;</span>
        <span id="calendarTitle">2026년 5월</span>
        <span class="nav-arrow" id="btnNextMonth">&gt;</span>
      </nav>
      <div class="calendar-grid" id="calendarGridTarget"></div>
    </article>

    <aside class="dashboard-card" id="rightCol">
      <section class="assignment-input-section">
        <h3 id="targetDateTitle" class="assignment-date-title">날짜를 선택하세요</h3>

        <div class="assignment-form-card">
          <h4>오늘의 운동 배정</h4>
          <div class="form-group">
            <label for="inputExerciseTitle">권장 운동 미션 명칭</label>
            <input type="text" id="inputExerciseTitle" placeholder="예) 유산소 인터벌 러닝 30분">
          </div>
          <div class="form-group">
            <label for="inputExerciseKcal">목표 소모 칼로리 (kcal)</label>
            <input type="number" id="inputExerciseKcal" value="300">
          </div>
        </div>

        <div class="assignment-form-card">
          <h4>오늘의 식단 가이드</h4>
          <div class="form-group">
            <label for="inputMealKcal">권장 칼로리 제한 (kcal)</label>
            <input type="number" id="inputMealKcal" value="1800">
          </div>
          
          <div class="form-group">
            <label for="inputMealCarbs">탄수화물 가이드 (g)</label>
            <input type="number" id="inputMealCarbs" value="200">
          </div>
          
          <div class="form-group">
            <label for="inputMealProtein">단백질 가이드 (g)</label>
            <input type="number" id="inputMealProtein" value="120">
          </div>
          
          <div class="form-group">
            <label for="inputMealFat">지방 가이드 (g)</label>
            <input type="number" id="inputMealFat" value="50">
          </div>
        </div>

        <button class="btn-primary full-width-button" id="btnSaveAssignment">오늘의 목표 정상 배정 / 업데이트</button>
      </section>
    </aside>
  </main>
</div>

<script>
  let users = JSON.parse(localStorage.getItem('users')) || [];
  let exerciseMissions = JSON.parse(localStorage.getItem('exerciseMissions')) || [];
  let mealTargets = JSON.parse(localStorage.getItem('mealTargets')) || [];

  let activeMemberId = localStorage.getItem('activeMemberId');
  let currentDate = new Date(2026, 4, 1); 
  let selectedDateStr = "2026-05-15"; 

  document.addEventListener('DOMContentLoaded', () => {
    if(!activeMemberId && users.length > 0) {
      activeMemberId = users[0].userId;
    }

    document.getElementById('btnGoTrainerDashboard').addEventListener('click', () => {
      location.href = 'trainer.html';
    });
    document.getElementById('btnBackTrainerList').addEventListener('click', () => {
      location.href = 'trainer.html';
    });
    document.getElementById('btnDeleteMember').addEventListener('click', deleteMember);
    
    document.getElementById('btnPtMinus').addEventListener('click', () => changePtCount(-1));
    document.getElementById('btnPtPlus').addEventListener('click', () => changePtCount(1));

    document.getElementById('btnPrevMonth').addEventListener('click', () => changeMonth(-1));
    document.getElementById('btnNextMonth').addEventListener('click', () => changeMonth(1));
    document.getElementById('btnSaveAssignment').addEventListener('click', saveGoalAssignment);

    initMemberHeader();
    renderCalendar();
    loadDateData(selectedDateStr);
  });

  function initMemberHeader() {
    const memberObj = users.find(u => u.userId === activeMemberId);
    if(memberObj) {
      document.getElementById('selectedMemberName').innerText = memberObj.name;
      document.getElementById('selectedMemberPt').innerText = memberObj.ptCount + '회';
    }
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById('calendarTitle').innerText = `${year}년 ${month + 1}월`;

    const grid = document.getElementById('calendarGridTarget');
    grid.innerHTML = '';

    const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];
    daysOfWeek.forEach(day => {
      const headerDiv = document.createElement('div');
      headerDiv.className = 'calendar-day-header';
      headerDiv.innerText = day;
      grid.appendChild(headerDiv);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const numDays = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const emptyCell = document.createElement('div');
      emptyCell.className = 'calendar-cell empty';
      grid.appendChild(emptyCell);
    }

    for (let day = 1; day <= numDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'calendar-cell';
      const dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cell.dataset.date = dayStr;

      const dayNumSpan = document.createElement('span');
      dayNumSpan.className = 'day-number';
      dayNumSpan.innerText = day;
      cell.appendChild(dayNumSpan);

      const dailyEx = exerciseMissions.find(e => e.memberId === activeMemberId && e.targetDate === dayStr);
      const dailyMeal = mealTargets.find(m => m.memberId === activeMemberId && m.targetDate === dayStr);

      if (dailyEx || dailyMeal) {
        const dotsContainer = document.createElement('div');
        dotsContainer.className = 'cell-dots-container';

        if (dailyEx) {
          const exDot = document.createElement('span');
          exDot.className = dailyEx.isCompleted ? 'dot dot-ex-success' : 'dot dot-ex-pending';
          dotsContainer.appendChild(exDot);
        }

        if (dailyMeal) {
          const mealDot = document.createElement('span');
          mealDot.className = 'dot dot-meal-assigned';
          dotsContainer.appendChild(mealDot);
        }
        cell.appendChild(dotsContainer);
      }

      if (dayStr === selectedDateStr) {
        cell.classList.add('selected');
      }

      cell.addEventListener('click', () => {
        document.querySelectorAll('.calendar-cell').forEach(c => c.classList.remove('selected'));
        cell.classList.add('selected');
        selectedDateStr = dayStr;
        loadDateData(dayStr);
      });

      grid.appendChild(cell);
    }
  }

  function changeMonth(direction) {
    currentDate.setMonth(currentDate.getMonth() + direction);
    renderCalendar();
  }

  function loadDateData(dateStr) {
    const formattedTitle = `${dateStr.split('-')[1]}월 ${dateStr.split('-')[2]}일 배정 스케줄`;
    document.getElementById('targetDateTitle').innerText = formattedTitle;

    const dailyEx = exerciseMissions.find(e => e.memberId === activeMemberId && e.targetDate === dateStr);
    if(dailyEx) {
      document.getElementById('inputExerciseTitle').value = dailyEx.missionTitle;
      document.getElementById('inputExerciseKcal').value = dailyEx.targetCalories;
    } else {
      document.getElementById('inputExerciseTitle').value = '';
      document.getElementById('inputExerciseKcal').value = '300';
    }

    const dailyMeal = mealTargets.find(m => m.memberId === activeMemberId && m.targetDate === dateStr);
    if(dailyMeal) {
      document.getElementById('inputMealKcal').value = dailyMeal.targetCalories;
      document.getElementById('inputMealCarbs').value = dailyMeal.targetCarbs;
      document.getElementById('inputMealProtein').value = dailyMeal.targetProtein;
      document.getElementById('inputMealFat').value = dailyMeal.targetFat;
    } else {
      document.getElementById('inputMealKcal').value = '1800';
      document.getElementById('inputMealCarbs').value = '200';
      document.getElementById('inputMealProtein').value = '120';
      document.getElementById('inputMealFat').value = '50';
    }
  }

  function saveGoalAssignment() {
    const exTitle = document.getElementById('inputExerciseTitle').value.trim();
    const exKcal = parseInt(document.getElementById('inputExerciseKcal').value) || 0;

    const calories = parseInt(document.getElementById('inputMealKcal').value) || 0;
    const carbs = parseInt(document.getElementById('inputMealCarbs').value) || 0;
    const protein = parseInt(document.getElementById('inputMealProtein').value) || 0;
    const fat = parseInt(document.getElementById('inputMealFat').value) || 0;

    const exIdx = exerciseMissions.findIndex(e => e.memberId === activeMemberId && e.targetDate === selectedDateStr);
    if(exIdx > -1) {
      if(!exTitle) {
        exerciseMissions.splice(exIdx, 1);
      } else {
        exerciseMissions[exIdx].missionTitle = exTitle;
        exerciseMissions[exIdx].targetCalories = exKcal;
      }
    } else if(exTitle) {
      exerciseMissions.push({ assignId: exerciseMissions.length+1, memberId: activeMemberId, targetDate: selectedDateStr, missionTitle: exTitle, targetCalories: exKcal, isCompleted: false });
    }

    const mealIdx = mealTargets.findIndex(m => m.memberId === activeMemberId && m.targetDate === selectedDateStr);
    if(mealIdx > -1) {
      mealTargets[mealIdx].targetCalories = calories;
      mealTargets[mealIdx].targetCarbs = carbs;
      mealTargets[mealIdx].targetProtein = protein; 
      mealTargets[mealIdx].targetFat = fat;
    } else {
      mealTargets.push({ assignId: mealTargets.length+1, memberId: activeMemberId, targetDate: selectedDateStr, targetCalories: calories, targetCarbs: carbs, targetProtein: protein, targetFat: fat });
    }

    localStorage.setItem('exerciseMissions', JSON.stringify(exerciseMissions));
    localStorage.setItem('mealTargets', JSON.stringify(mealTargets));
    alert("오늘의 목표 배정이 정상 저장되었습니다.");
    renderCalendar();
    loadDateData(selectedDateStr);
  }

  function changePtCount(amount) {
    const memberObj = users.find(u => u.userId === activeMemberId);
    if(memberObj) {
      memberObj.ptCount = Math.max(0, memberObj.ptCount + amount);
      document.getElementById('selectedMemberPt').innerText = memberObj.ptCount + '회';
      localStorage.setItem('users', JSON.stringify(users));
    }
  }

  function deleteMember() {
    if(confirm("이 회원의 데이터를 삭제하시겠습니까? 관련 목표 정보가 제거됩니다.")) {
      users = users.filter(u => u.userId !== activeMemberId);
      exerciseMissions = exerciseMissions.filter(e => e.memberId !== activeMemberId);
      mealTargets = mealTargets.filter(m => m.memberId !== activeMemberId);

      localStorage.setItem('users', JSON.stringify(users));
      localStorage.setItem('exerciseMissions', JSON.stringify(exerciseMissions));
      localStorage.setItem('mealTargets', JSON.stringify(mealTargets));

      alert("회원 정보가 삭제되었습니다.");
      location.href = 'trainer.html';
    }
  }
</script>
</body>
</html>
