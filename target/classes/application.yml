spring:
  # 1. 데이터베이스 연결 설정 (MariaDB)
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # localhost:3306 뒤의 'javaproject'은 생성하신 데이터베이스(스키마) 이름과 일치해야 합니다.
    url: jdbc:mariadb://localhost:3306/javaproject
    username: root        # 데이터베이스 접속 계정명 (본인의 환경에 맞게 변경)
    password: ''        # 데이터베이스 접속 비밀번호 (본인의 환경에 맞게 변경)

  # 2. JPA & Hibernate 설정
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    
    # 하이버네이트 구동 전략 설정
    # - update: 엔티티 구조와 DB 테이블 구조를 비교하여 변경된 부분만 자동으로 수정/반영합니다.
    # - validate: 엔티티와 테이블이 제대로 매핑되었는지 검증만 수행합니다. (운영 환경 추천)
    hibernate:
      ddl-auto: none
      
    # 콘솔창에 JPA가 내부적으로 생성해서 날리는 SQL 실행 쿼리문을 출력합니다.
    show-sql: true
    
    properties:
      hibernate:
        # SQL 출력 시 한 줄로 길게 나오지 않고, 보기 좋게 정렬(포매팅)되어 출력되도록 합니다.
        format_sql: true
        # SQL 내부의 바인딩 파라미터 값(?로 표시되는 값)이 실제로 어떤 값으로 들어갔는지 로그로 보여줍니다.
        use_sql_comments: true

  # 3. Thymeleaf (HTML 뷰 템플릿) 설정
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    # 개발 단계에서는 HTML 수정 후 새로고침 시 바로 반영되도록 캐시를 끕니다. (운영 시 true 권장)
    cache: false

# 4. 전체 애플리케이션 및 JPA 파라미터 로깅 레벨 상세 설정
logging:
  level:
    root: info
    # JPA가 DB에 밀어 넣는 파라미터의 실제 값(데이터)을 콘솔창에 상세 로그로 찍어주는 옵션입니다.
    org.hibernate.orm.results: trace
    org.hibernate.stat: debug