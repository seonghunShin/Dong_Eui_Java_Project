<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITLINK 회원 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="appWrapper">
  <header id="globalHeader">
    <div id="logo">FITLINK</div>
    <div id="userInfo">
      <span><b>김트레이너</b> 강사님</span>
    </div>
  </header>

  <main id="myMembersContainer">
    <section class="section-header">
      <h2>내 담당 회원 현황</h2>
      <button class="btn-add" id="btnOpenAddModal">+ 신규 회원 등록</button>
    </section>

    <section id="memberList"></section>
  </main>
</div>

<div class="custom-modal" id="addMemberModal">
  <div class="modal-content">
    <h3>신규 회원 등록</h3>
    <div class="form-group">
      <label for="newMemberName">회원 이름</label>
      <input type="text" id="newMemberName" placeholder="이름 입력">
    </div>
    <div class="form-group">
      <label for="newMemberId">회원 아이디</label>
      <input type="text" id="newMemberId" placeholder="아이디 입력">
    </div>
    <div class="form-group">
      <label for="newMemberPt">부여할 PT 횟수</label>
      <input type="number" id="newMemberPt" value="10">
    </div>
    
    <div class="modal-buttons">
      <button class="btn-cancel" id="btnCloseModal">취소</button>
      <button class="btn-primary" id="btnSubmitMember">등록하기</button>
    </div>
  </div>
</div>

<script>
  let users = JSON.parse(localStorage.getItem('users'));
  if(!users) {
    users = [
      { userId: "user01", name: "서준영", ptCount: 8 },
      { userId: "user02", name: "김지아", ptCount: 15 },
      { userId: "user03", name: "박태형", ptCount: 0 }
    ];
    localStorage.setItem('users', JSON.stringify(users));
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderMemberList();
    document.getElementById('btnOpenAddModal').addEventListener('click', openAddModal);
    document.getElementById('btnCloseModal').addEventListener('click', closeAddModal);
    document.getElementById('btnSubmitMember').addEventListener('click', submitNewMember);
  });

  function renderMemberList() {
    const container = document.getElementById('memberList');
    container.innerHTML = '';

    users.forEach(user => {
      // 카드 구성을 이름, 남은 pt 횟수, 아이디 3개로 변경
      const cardHtml = `
        <div class="member-card" data-userid="${user.userId}">
          <div class="member-info-header">
            <span class="member-name">${user.name}</span>
            <span class="pt-badge">PT ${user.ptCount}회 남음</span>
          </div>
          <div class="member-stats-preview">
            <div class="stat-preview-item">
              <span>회원 ID</span>
              <span class="stat-value-highlight">${user.userId}</span>
            </div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', cardHtml);
    });

    document.querySelectorAll('.member-card').forEach(card => {
      card.addEventListener('click', () => {
        const userId = card.getAttribute('data-userid');
        goDetail(userId);
      });
    });
  }

  function openAddModal() {
    document.getElementById('addMemberModal').style.display = 'flex';
  }

  function closeAddModal() {
    document.getElementById('addMemberModal').style.display = 'none';
  }

  function submitNewMember() {
    const name = document.getElementById('newMemberName').value.trim();
    const id = document.getElementById('newMemberId').value.trim();
    const pt = parseInt(document.getElementById('newMemberPt').value) || 0;

    if(!name || !id) {
      alert("정보를 모두 정확하게 작성해 주세요.");
      return;
    }

    if(users.some(u => u.userId === id)) {
      alert("이미 존재하는 회원 아이디입니다.");
      return;
    }

    users.push({
      userId: id,
      name: name,
      ptCount: pt
    });

    localStorage.setItem('users', JSON.stringify(users));
    alert("신규 회원이 정상 등록되었습니다.");
    
    document.getElementById('newMemberName').value = '';
    document.getElementById('newMemberId').value = '';
    document.getElementById('newMemberPt').value = '10';
    
    closeAddModal();
    renderMemberList();
  }

  function goDetail(userId) {
    localStorage.setItem('activeMemberId', userId);
    location.href = 'membercalender.html';
  }
</script>
</body>
</html>
