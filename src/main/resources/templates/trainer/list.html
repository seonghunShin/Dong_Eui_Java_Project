<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITLINK 트레이너 대시보드</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div id="appWrapper">
  <header id="header">
    <div id="logo">FITLINK <span style="font-size:14px; color:#ddd;">(Trainer)</span></div>
    <div id="userInfo">
      <span><b th:text="${session.loginUser != null ? session.loginUser.name : '강사'}">강사</b> 강사님</span>
      <button onclick="location.href='/user/logout'">로그아웃</button>
    </div>
  </header>

  <main id="mainContent">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2>내 담당 회원 관리</h2>
      <div style="margin-bottom: 25px; background: white; padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
        <form action="/trainer/member/add" method="post" style="display: flex; gap: 10px; align-items: center;">
          <h3 style="margin: 0;">회원 추가:</h3>
          <input type="text" name="userId" class="form-control" placeholder="회원 아이디 입력" required style="margin-bottom: 0; width: 300px;">
          <button type="submit" class="btn-primary">회원 추가하기</button>
        </form>
      </div>
    </div>

    <section class="member-list-grid">
      <div class="member-card" th:each="member : ${chargeList}" 
           th:data-url="@{|/trainer/member/${member.memberId}|}"
           onclick="location.href=this.getAttribute('data-url')">
        <div class="member-info-header">
          <span class="member-name" th:text="${member.name}">회원이름</span>
          <span class="pt-badge" th:text="'PT ' + ${member.ptCount} + '회 남음'">PT 0회 남음</span>
        </div>
        <div class="member-stats-preview">
          <div class="stat-preview-item">
            <span>회원 ID</span>
            <span class="stat-value-highlight" th:text="${member.memberId}">userId</span>
          </div>
        </div>
      </div>
      
      <div th:if="${chargeList == null or chargeList.isEmpty()}" style="padding: 20px; text-align: center; color: #888; grid-column: span 2;">
        현재 담당 중인 회원이 없습니다.
      </div>
    </section>
  </main>
</div>
</body>
</html>
