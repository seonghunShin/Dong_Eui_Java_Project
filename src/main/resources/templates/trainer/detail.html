<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITLINK 회원 상세 관리</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div id="appWrapper">
  <header id="header">
    <div id="logo">FITLINK <span style="font-size:14px; color:#ddd;">(Trainer)</span></div>
    <div id="userInfo">
      <button onclick="location.href='/trainer/members'">← 목록으로 돌아가기</button>
      <button class="btn-delete" onclick="deleteMember()" style="margin-left: 10px; background: #ff4d4d; color: white;">회원 삭제</button>
    </div>
  </header>

  <main id="mainContent">
    <div class="calendar-layout">
      <div class="calendar-main-section dashboard-card">
        <div class="calendar-header">
          <h2><span th:text="${pageUserName != null ? pageUserName : pageUserId}">회원이름</span>님의 캘린더</h2>
        </div>
        <div class="calendar-grid-header">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
          <div class="calendar-grid">
            <div class="calendar-cell" th:each="day : ${#numbers.sequence(1, 31)}" 
                  th:data-url="@{|/trainer/member/${pageUserId}|(date=|${selectedDate.year}-${#numbers.formatInteger(selectedDate.monthValue, 2)}-${#numbers.formatInteger(day, 2)}|)}"
                  onclick="location.href=this.getAttribute('data-url')">
              <div class="day-number" th:text="${day}">1</div>
              <div class="cell-dots-container" th:if="${todoDay != null and todoDay.get(day) != null}">
                <span class="dot dot-ex-success"></span> 
                <span class="dot dot-meal-success"></span>
              </div>
            </div>
          </div>
      </div>

      <div class="calendar-side-panel">
        <article class="dashboard-card">
          <div class="card-header">
            <h3>PT 횟수 관리</h3>
            <span class="pt-badge" id="selectedMemberPt" th:text="'현재 ' + ${ptCount} + '회 남음'">현재 0회 남음</span>
          </div>
          <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-primary" onclick="updatePtCountPrompt()" style="flex: 1; background: #ff4d4d;">PT 횟수 변경하기</button>
            <script th:inline="javascript">
              function updatePtCountPrompt() {
                // 타임리프의 모델 값을 자바스크립트 변수로 안전하게 가져옵니다.
                const memberId = "[[${pageUserId}]]"; 
                
                let ptCountInput = prompt("변경할 최종 PT 횟수를 숫자로 입력하세요:");
                if(ptCountInput !== null) {
                    fetch('/trainer/member/update-pt', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ memberId: memberId, ptCount: parseInt(ptCountInput) })
                    }).then(res => { 
                        if(res.ok) {
                            alert("PT 횟수가 변경되었습니다.");
                            location.reload(); 
                        } else {
                            alert("횟수 변경에 실패했습니다.");
                        }
                    });
                }
              }
            </script>
          </div>
        </article>

        <article class="dashboard-card">
          <div class="card-header">
            <h3 th:text="${selectedDate != null ? selectedDate : '날짜 선택'} + ' 목표 배정'">날짜 목표 배정</h3>
          </div>
          <form action="/trainer/member/assign-target" method="post">
            <input type="hidden" name="memberId" th:value="${pageUserId}">
            <input type="hidden" name="targetDate" th:value="${selectedDate}">
            <div style="margin-bottom: 20px;">
              <label>운동 미션</label>
              <input type="text" name="targetExerciseName" class="form-control" required>
              <label>목표 소모 칼로리 (kcal)</label>
              <input type="number" name="targetBurnedCalories" class="form-control" required>
            </div>
            <div style="margin-bottom: 20px;">
              <label>식단 가이드</label>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" name="targetCalories" class="form-control" placeholder="총 kcal" required>
                <input type="number" name="targetCarbs" class="form-control" placeholder="탄수화물(g)" required>
                <input type="number" name="targetProtein" class="form-control" placeholder="단백질(g)" required>
                <input type="number" name="targetFat" class="form-control" placeholder="지방(g)" required>
              </div>
            </div>
            <button type="submit" class="btn-primary full-width-button" th:disabled="${selectedDate == null}">목표 정상 배정 / 업데이트</button>
          </form>
        </article>
      </div>
    </div>
  </main>
</div>

<script th:inline="javascript">
  function updatePtCountPrompt() {
    const memberId = "[[${pageUserId}]]"; // 타임리프 인라인 사용
    let ptCountInput = prompt("변경할 최종 PT 횟수를 숫자로 입력하세요:");
    if(ptCountInput !== null) {
        fetch('/trainer/member/update-pt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ memberId: memberId, ptCount: parseInt(ptCountInput) })
        }).then(res => { if(res.ok) location.reload(); });
    }
  }

  function deleteMember() {
    if(confirm("정말 이 회원을 삭제하시겠습니까?")) {
      const memberId = "[[${pageUserId}]]";
      fetch('/trainer/member/remove?memberId=' + memberId, { method: 'POST' })
      .then(res => { if(res.ok) location.href = '/trainer/members'; });
    }
  }
</script>
</body>
</html>
