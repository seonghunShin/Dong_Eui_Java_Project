<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITLINK 대시보드</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div id="appWrapper">
  <header id="header">
    <div id="logo">FITLINK</div>
    <div id="userInfo">
      <span><b th:text="${dashboard.name}">회원</b> 회원님</span>
      <button id="btnGoCalendar" onclick="location.href='/member/calendar'">내 목표 달력 보기</button>
      
      <form action="/logout" method="post" style="display:inline;">
        <button type="submit" class="btn-logout" style="margin-left: 10px; cursor: pointer;">로그아웃</button>
      </form>
    </div>
  </header>

  <main id="mainContent">
    <div class="top-row-grid">
      
      <article class="dashboard-card">
        <div class="card-header">
          <h2>오늘의 운동 목표</h2>
          <span class="status-badge" 
                th:classappend="${todayExercise != null and todayExercise.todoGoal ? 'success' : 'warning'}"
                th:text="${todayExercise != null and todayExercise.todoGoal ? '완료' : '미완료'}">미완료</span>
        </div>
        
        <section class="exercise-info">
          <p class="exercise-mission-description" 
             th:text="${todayExercise != null ? todayExercise.targetExercise : '지정 미션이 없습니다.'}">지정 미션이 없습니다.</p>
          
          <div class="calorie-large">
            <span th:text="${todayExercise != null ? todayExercise.targetBurnedCal : '0'}">0</span> 
            <span class="sub-text">kcal 소모 필요</span>
          </div>
          
          <form action="/member/exercise/toggle" method="post" th:if="${todayExercise != null}">
            
            <input type="hidden" name="assignId" th:value="${todayExercise.assignId}">
            
            <button type="submit" class="btn-primary full-width-button" 
                    th:disabled="${todayExercise.todoGoal}"
                    th:text="${todayExercise.todoGoal ? '오늘의 미션 완료됨' : '미션 완료 처리하기'}">미션 완료 처리하기</button>
          </form>
          
        </section>
      </article>

      <article class="dashboard-card">
        <div class="card-header">
          <h2>오늘의 권장 영양 & 섭취 현황</h2>
          <th:block th:if="${todayMeal != null}">
            <span class="status-badge success" th:if="${totalKcal > 0 and totalKcal <= todayMeal.targetCalories}">식단 관리 성공</span>
            <span class="status-badge fail" th:if="${totalKcal > todayMeal.targetCalories}">식단 초과 실패</span>
            <span class="status-badge warning" th:if="${totalKcal == 0}">기록 대기중</span>
          </th:block>
          <span class="status-badge" th:if="${todayMeal == null}">지정 정보 없음</span>
        </div>
        
        <section class="nutrition-dashboard" th:if="${todayMeal != null}">
          <div class="nutrition-dashboard">
            <div class="nutrient-progress-row">
              <span>칼로리 섭취량 (<span th:text="${totalKcal}">0</span> / <span th:text="${todayMeal.targetCalories}">0</span> kcal)</span>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill fill-kcal" 
                     th:style="'width: ' + (${todayMeal.targetCalories > 0 ? (totalKcal * 100.0 / todayMeal.targetCalories) : 0}) + '%; max-width: 100%;'"></div>
              </div>
            </div>
            <div class="nutrient-progress-row">
              <span>탄수화물 (<span th:text="${totalCarbs}">0</span> / <span th:text="${todayMeal.targetCarbs}">0</span> g)</span>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill fill-carbs" 
                     th:style="'width: ' + (${todayMeal.targetCarbs > 0 ? (totalCarbs * 100.0 / todayMeal.targetCarbs) : 0}) + '%; max-width: 100%;'"></div>
              </div>
            </div>
            <div class="nutrient-progress-row">
              <span>단백질 (<span th:text="${totalProtein}">0</span> / <span th:text="${todayMeal.targetProtein}">0</span> g)</span>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill fill-protein" 
                     th:style="'width: ' + (${todayMeal.targetProtein > 0 ? (totalProtein * 100.0 / todayMeal.targetProtein) : 0}) + '%; max-width: 100%;'"></div>
              </div>
            </div>
            <div class="nutrient-progress-row">
              <span>지방 (<span th:text="${totalFat}">0</span> / <span th:text="${todayMeal.targetFat}">0</span> g)</span>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill fill-fat" 
                     th:style="'width: ' + (${todayMeal.targetFat > 0 ? (totalFat * 100.0 / todayMeal.targetFat) : 0}) + '%; max-width: 100%;'"></div>
              </div>
            </div>
          </div>
        </section>
        
        <section th:if="${todayMeal == null}" style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
          오늘 트레이너가 배정한 식단 가이드가 없습니다.
        </section>
      </article>

    </div>

    <article class="dashboard-card">
      <div class="card-header">
        <h2>오늘 먹은 식단 등록하기</h2>
      </div>
      <section class="meal-registration-form">
        
        <form action="/member/diet/record" method="post">
          <div class="form-row">
            <select name="mealType" class="form-control">
              <option value="아침">아침</option>
              <option value="점심">점심</option>
              <option value="저녁">저녁</option>
              <option value="간식">간식</option>
            </select>
            <input type="text" name="foodName" placeholder="음식명 (예: 닭가슴살)" class="form-control" required>
            <input type="time" name="mealTime" class="form-control" required>
          </div>
          
          <div class="nutrient-inputs">
            <input type="number" name="carbo" placeholder="탄수화물(g)" class="form-control">
            <input type="number" name="protein" placeholder="단백질(g)" class="form-control">
            <input type="number" name="fat" placeholder="지방(g)" class="form-control">
            <input type="number" name="calories" placeholder="칼로리(kcal)" class="form-control" required>
          </div>

          <button type="submit" class="btn-primary full-width-button">식사 추가 완료</button>
        </form>
      </section>
    </article>
    <article class="dashboard-card" th:if="${!dashboard.todayMealRecords.isEmpty()}">
      <div class="card-header">
        <h2>오늘 기록한 식사 내역</h2>
      </div>
      <div class="scrollable-meal-list">
        <div class="meal-item" th:each="record : ${dashboard.todayMealRecords}">
          <div class="meal-header">
            <span class="meal-tag tag-success" th:text="${record.mealType}">종류</span>
            <span class="meal-time-info" th:text="${record.mealTime}">시간</span>
          </div>
          <div class="meal-name-row">
            <span class="food-name-title" th:text="${record.foodName}">음식명</span>
            <span class="kcal-text-highlight" th:text="${record.calories} + ' kcal'">0 kcal</span>
          </div>
        </div>
      </div>
    </article>
  </main>
</div>

</body>
</html>
